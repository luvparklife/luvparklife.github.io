<!DOCTYPE html>
<html lang="ko">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>프로덕션 허브</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: #f4f5f7; color: #1a1a1a;
      padding: 28px 18px; -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 520px; margin: 0 auto; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .sub { font-size: 13px; color: #6b7280; margin-bottom: 24px; }
    a.card {
      display: block; text-decoration: none; color: inherit;
      background: #fff; border: 1px solid #e5e7eb; border-radius: 14px;
      padding: 18px 18px; margin-bottom: 12px;
      transition: transform .08s ease, box-shadow .12s ease, border-color .12s ease;
    }
    a.card:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(0,0,0,.08); border-color: #c7cbd1; }
    a.card:active { transform: translateY(0); }
    .row { display: flex; align-items: center; gap: 14px; }
    .icon { font-size: 30px; width: 42px; text-align: center; flex-shrink: 0; }
    .body { flex: 1; min-width: 0; }
    .title { font-size: 17px; font-weight: 600; }
    .desc { font-size: 13px; color: #4b5563; margin-top: 2px; line-height: 1.45; }
    .note { font-size: 11px; color: #9ca3af; margin-top: 5px; }
    .arrow { font-size: 20px; color: #c0c4cc; flex-shrink: 0; }
    .foot { font-size: 11px; color: #b0b4bb; text-align: center; margin-top: 22px; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>프로덕션 허브</h1>
    <p class="sub">필요한 앱을 눌러 들어가세요. 이 페이지 하나만 북마크하면 됩니다.</p>

    <a class="card" href="https://script.google.com/macros/s/AKfycbyQCNwXv6YNoCIoPxZPhVF1iXJOETnyG9bbkIPAboouI7Dfw6TkokUmabxdlhZUjZ4t/exec" target="_blank" rel="noopener">
      <div class="row">
        <div class="icon">🎬</div>
        <div class="body">
          <div class="title">현장 장비 앱</div>
          <div class="desc">현장 스태프 — 장비 준비 / 랩업 / 반납 체크 (폰)</div>
          <div class="note">구글 로그인 필요</div>
        </div>
        <div class="arrow">›</div>
      </div>
    </a>

    <a class="card" href="https://script.google.com/macros/s/AKfycbz_DdnNbNo2Am4EtANiStIyAg8-VG_tx1_vgBQk7_g3AmTthWVHWCVoxRMECOygBL1G/exec" target="_blank" rel="noopener">
      <div class="row">
        <div class="icon">💰</div>
        <div class="body">
          <div class="title">프리랜서 정산 앱</div>
          <div class="desc">프리랜서 — 본인 청구 / 정산 확인</div>
          <div class="note">프리랜서는 개인 토큰 링크로 접속 (이 버튼은 관리자용)</div>
        </div>
        <div class="arrow">›</div>
      </div>
    </a>

    <a class="card" href="https://script.google.com/macros/s/AKfycbz_DdnNbNo2Am4EtANiStIyAg8-VG_tx1_vgBQk7_g3AmTthWVHWCVoxRMECOygBL1G/exec?page=lifecycle" target="_blank" rel="noopener">
      <div class="row">
        <div class="icon">📋</div>
        <div class="body">
          <div class="title">프로젝트 생애주기 입력</div>
          <div class="desc">내부 — 새 프로젝트 시작 시 노션에 정보 등록</div>
          <div class="note">내부용</div>
        </div>
        <div class="arrow">›</div>
      </div>
    </a>

    <p class="foot">각 앱은 서로 독립적으로 작동합니다.<br>앱 링크가 바뀌면 이 페이지(index.html)만 갱신하면 됩니다.</p>
  </div>
</body>
</html>
